<h1>Produção</h1>

<div class="topo">
  <input id="linha" placeholder="Ex: Linha 1">
  
  <select id="tipo">
  
    <option value="RECOLHER">
    RECOLHER
  </option>
  
  <option value="ABASTECER">
    Abastecer Embalagem
  </option>
  
</select>

</select> 
  <button onclick="enviar()">Notificar</button>
</div>

<h2>Alertas</h2>

<div id="lista"></div>

<style>
body{
  font-family: Arial;
  background:#7d99ac;

   background-image: url("borda.png");
  background-repeat: no-repeat;
  background-size: cover;
  background-position: center;
  background-attachment: fixed;

  
}

img{
  padding:10px 15px;
}

h1{
  text-align:center;
  color:rgb(32, 31, 31);
  font-size:42px;
  
}

h2{
  text-align:center;

}

.topo{
display:flex;
  justify-content:center;
  gap:10px;

  margin:auto;
  margin-bottom:25px;

  padding:20px;

  width:fit-content;

  background:rgba(255,255,255,0.15);

  backdrop-filter:blur(8px);

  border-radius:15px;
}

input{
  padding:12px;
  width:220px;
  font-size:15px;
  border:none;
  border-radius:10px;
  outline:none;
  background:rgba(255,255,255,0.9);
}

select{
  padding:12px;
  width:200px;
  font-size:15px;
  border:none;
  border-radius:10px;
  outline:none;
  background:rgba(255,255,255,0.9);
}

button{
  padding:12px 18px;

  cursor:pointer;

  border:none;

  border-radius:10px;

  font-weight:bold;

  background:#0c709e;

  color:white;

  transition:0.3s;
}

button:hover{
  transform:scale(1.03);

  background:#09597c;
}

#lista{
  max-width:600px;
  margin:auto;
}

.alerta{
  background:white;
  border-left:8px solid red;
  padding:15px;
  margin-bottom:10px;
  border-radius:8px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.finalizado{
  border-left-color:green;
  opacity:0.7;
}

.status{
  font-weight:bold;
  margin-top:5px;
}

.btn-finalizar{
  background:green;
  color:white;
  margin-top:10px;
}

.btn-alerta{
  background:red;
  color:white;
}
</style>

<script src="/socket.io/socket.io.js"></script>

<script>

async function validar(){

  const token = localStorage.getItem("token");

  if(!token){
    location.href = "/";
    return;
  }

  try{

    const resposta = await fetch("/validar-token",{
      headers:{
        Authorization:`Bearer ${token}`
      }
    });

    if(!resposta.ok){

      alert("Sessão expirada");

      localStorage.removeItem("token");

      location.href = "/";

    }

  }catch{

    location.href = "/";

  }

}

validar();

</script>


<script>



const socket = io({

  auth:{
    token:
      localStorage.getItem("token")
  }

});

function enviar() {

  const linhaInput =
    document.getElementById("linha");

  const tipoSelect =
    document.getElementById("tipo");

  const linha =
    linhaInput.value.trim();

  const tipo =
    tipoSelect.value;

  if (!linha){
    alert("Informe a linha!");
    return;
  }

  socket.emit("novoAlerta", {
    linha,
    tipo
  });

  linhaInput.value = "";
  
  linhaInput.focus();
}

socket.on("listaAlertas", (alertas) => {

  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  // últimos 10
  const ultimos = alertas.slice(-10).reverse();

  ultimos.forEach(a => {

    const div = document.createElement("div");

    div.className = `
      alerta
      ${a.status === "FINALIZADO" ? "finalizado" : ""}
    `;

    div.innerHTML = `
  <div><b>${a.linha}</b></div>

  <div>
    <b>Solicitação:${a.tipo}</b>
  </div>

  <div class="status">
    Status: ${a.status}
  </div>

  <div>
    <b>Hora: ${a.hora}</b>
  </div>

  ${
    a.status === "ACAMINHO"
    ?
    `<button class="btn-finalizar"
      onclick="finalizar(${a.id})">
      ✅ Finalizar
    </button>`
    :
    ""
  }
`;

    lista.appendChild(div);
  });
});

function finalizar(id){
  socket.emit("finalizar", id);
}
</script>
